name: Ažuriraj Explora M3U
on:
schedule:
 # 🕐 UTORCI 17:00-23:30 svakih 30 min (CET = UTC+1)
    # UTC: 16:00, 16:30, 17:00... 22:30 → CET: 17:00-23:30
    - cron: '0,30 16-22 * * 2'
workflow_dispatch:

permissions:
contents: write

jobs:
update:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4

- name: Setup Node.js
uses: actions/setup-node@v4
with:
node-version: '20'

# PUPPETEER SPECIFIČNI SETUP
- name: Instaliraj Chrome i Puppeteer
run: |
npm init -y
npm install puppeteer cheerio axios
npx puppeteer browsers install chrome

- name: Generiraj M3U s Puppeteer
run: node update-m3u.js

- name: Commit i push
uses: stefanzweifel/git-auto-commit-action@v5
with:
commit_message: "Explora: ${{ github.run_id }}"
file_pattern: explora.m3u
