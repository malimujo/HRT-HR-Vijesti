name: Ažuriraj vijesti M3U
on:
  schedule:
    - cron: '0 */6 * * *'  # Svakih 6 sati
  workflow_dispatch:

permissions:
  contents: write  # ← OVO je ključno za 403 fix!

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Instaliraj pakete
      run: npm init -y && npm install cheerio axios
    
    - name: Generiraj M3U
      run: node update-m3u.js
    
    - name: Commit i push
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Vijesti ažurirano: ${{ github.run_id }}"
        file_pattern: vijesti.m3u
